<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Уже есть</title>
<style>
@font-face {
  font-family: 'Miama Nueva';
  src: url('fonts/miamanueva.otf') format('opentype'),
       url('fonts/miamanueva.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100%;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  overflow: hidden;
}

#app {
  width: 100%;
  height: 100vh;
  position: relative;
  background: linear-gradient(160deg, #f08a6c 0%, #f5a98b 22%, #f7b8a8 42%, #f3aec2 62%, #d9a8cf 82%, #c79bd1 100%);
  overflow: hidden;
}

canvas#sparks {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
}

.topbar {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 5;
  padding: 32px 48px 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.topbar .logo {
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  letter-spacing: 0.08em;
  margin-bottom: 18px;
  text-decoration: none;
}

.topbar .line {
  width: 100%;
  max-width: 1040px;
  height: 1px;
  background: rgba(255,255,255,0.25);
}

.nav-links {
  position: absolute;
  top: 28px;
  right: 40px;
  z-index: 6;
  display: flex;
  gap: 18px;
}
.nav-links a {
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  text-decoration: none;
  letter-spacing: 0.04em;
  border-bottom: 1px solid transparent;
  transition: all .2s;
}
.nav-links a:hover { color: rgba(255,255,255,0.95); border-bottom-color: rgba(255,255,255,0.6); }

.stage {
  position: relative;
  z-index: 3;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 24px;
  opacity: 0;
  visibility: hidden;
  transition: opacity 1.1s ease;
}
.screen.active {
  opacity: 1;
  visibility: visible;
}

/* Экран 1 */
.headline {
  font-size: 38px;
  font-weight: 400;
  color: rgba(255,255,255,0.95);
  text-align: center;
  line-height: 1.45;
  letter-spacing: -0.01em;
  max-width: 700px;
}
.start-hint {
  margin-top: 56px;
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  letter-spacing: 0.1em;
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.35);
  padding: 12px 32px;
  border-radius: 999px;
  transition: all .25s;
  background: rgba(255,255,255,0.06);
}
.start-hint:hover { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.6); }

/* Экран 2 */
.headline-sm {
  font-size: 24px;
  font-weight: 400;
  color: rgba(255,255,255,0.55);
  text-align: center;
  line-height: 1.5;
  margin-bottom: 44px;
  max-width: 600px;
  transition: opacity .4s;
}
.input-group {
  width: 100%;
  max-width: 440px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.input-pill {
  width: 100%;
  background: rgba(255,255,255,0.92);
  border: none;
  border-radius: 26px;
  padding: 16px 26px;
  font-size: 16px;
  color: #6b4a4a;
  text-align: center;
  outline: none;
  font-family: inherit;
  box-shadow: 0 4px 18px rgba(0,0,0,0.06);
}
.input-pill::placeholder { color: rgba(107,74,74,0.35); }

.enter-btn {
  margin-top: 28px;
  font-size: 13px;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.7);
  background: transparent;
  border: 1px solid rgba(255,255,255,0.4);
  padding: 11px 38px;
  border-radius: 999px;
  cursor: pointer;
  transition: all .25s;
  opacity: 0.4;
  pointer-events: none;
}
.enter-btn.ready { opacity: 1; pointer-events: auto; }
.enter-btn.ready:hover { background: rgba(255,255,255,0.18); }

/* Экран 3 - облако слов */
.cloud-wrap {
  position: relative;
  width: 100%;
  height: 100%;
}
.floating-word {
  position: absolute;
  font-family: 'Miama Nueva', cursive;
  color: rgba(255,255,255,0.85);
  font-size: 34px;
  opacity: 0;
  white-space: nowrap;
  transition: opacity 1.4s ease, transform 1.4s ease;
  transform: translateY(8px);
}
.floating-word.show {
  opacity: 1;
  transform: translateY(0);
}
.floating-word.user-word {
  color: rgba(255,255,255,0.98);
  font-size: 40px;
}

/* Экран 4 */
.final-list {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.final-item {
  font-family: 'Miama Nueva', cursive;
  font-size: 38px;
  color: rgba(255,255,255,0.97);
  text-align: center;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity .9s ease, transform .9s ease;
}
.final-item.show { opacity: 1; transform: translateY(0); }

.divider {
  width: 36px;
  height: 1px;
  background: rgba(255,255,255,0.4);
  margin: 26px auto;
  opacity: 0;
  transition: opacity 1s ease;
}
.divider.show { opacity: 1; }

.final-caption {
  font-size: 15px;
  color: rgba(255,255,255,0.65);
  letter-spacing: 0.14em;
  text-align: center;
  opacity: 0;
  transition: opacity 1.2s ease;
}
.final-caption.show { opacity: 1; }

.restart-hint {
  margin-top: 48px;
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 0.08em;
  cursor: pointer;
  opacity: 0;
  transition: opacity 1.5s ease;
  text-decoration: underline;
}
.restart-hint.show { opacity: 1; }

@media (max-width: 600px) {
  .headline { font-size: 26px; }
  .headline-sm { font-size: 17px; }
  .final-item { font-size: 28px; }
  .floating-word { font-size: 22px; }
  .floating-word.user-word { font-size: 26px; }
  .nav-links { top: 16px; right: 16px; gap: 10px; }
  .nav-links a { font-size: 10px; }
}
</style>
</head>
<body>

<div id="app">
  <canvas id="sparks"></canvas>

  <div class="nav-links">
    <a href="essay.html">Эссе</a>
    <a href="analytics.html">Аналитика</a>
  </div>

  <div class="topbar">
    <a href="index.html" class="logo">УЖЕ ЕСТЬ</a>
    <div class="line"></div>
  </div>

  <div class="stage">

    <!-- Экран 1 -->
    <div class="screen active" id="screen-1">
      <p class="headline">Напиши три вещи,<br>которые у тебя<br>уже есть</p>
      <div class="start-hint" onclick="goToScreen(2)">начать</div>
    </div>

    <!-- Экран 2 -->
    <div class="screen" id="screen-2">
      <p class="headline-sm" id="q-fade">Напиши три вещи, которые у тебя уже есть</p>
      <div class="input-group">
        <input class="input-pill" id="inp1" placeholder="первая вещь..." maxlength="40">
        <input class="input-pill" id="inp2" placeholder="вторая вещь..." maxlength="40">
        <input class="input-pill" id="inp3" placeholder="третья вещь..." maxlength="40">
      </div>
      <button class="enter-btn" id="enterBtn" onclick="submitWords()">далее</button>
    </div>

    <!-- Экран 3 -->
    <div class="screen" id="screen-3">
      <div class="cloud-wrap" id="cloudWrap"></div>
    </div>

    <!-- Экран 4 -->
    <div class="screen" id="screen-4">
      <div class="final-list" id="finalList"></div>
      <div class="divider" id="finalDivider"></div>
      <p class="final-caption" id="finalCaption">это уже твоё</p>
      <p class="restart-hint" id="restartHint" onclick="restart()">пройти снова</p>
    </div>

  </div>
</div>

<script>
// ---------- Sparks background ----------
function initSparks() {
  const canvas = document.getElementById('sparks');
  const ctx = canvas.getContext('2d');
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const particles = Array.from({length: 70}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.8 + 0.4,
    phase: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.006 + 0.003,
    drift: (Math.random() - 0.5) * 0.12
  }));

  let t = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    t += 0.02;
    particles.forEach(p => {
      p.x += p.drift;
      if (p.x < 0) p.x = canvas.width;
      if (p.x > canvas.width) p.x = 0;
      const alpha = 0.2 + 0.55 * Math.abs(Math.sin(t * p.speed * 50 + p.phase));
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(2)})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
}
initSparks();

// ---------- Other people's phrases (pool) ----------
const otherPhrases = [
  "запах дома", "мама", "первый кофе", "мой пёс", "тишина утром",
  "подруга", "тёплый плед", "смех", "солнце в окне", "бабушкины руки",
  "тот, кто ждёт дома", "друг, который всегда рядом", "улыбка незнакомца",
  "мамин голос", "утро без будильника", "горячий чай", "объятия без повода",
  "любимая песня", "запах маминой еды", "момент когда всё хорошо"
];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ---------- Screen navigation ----------
let userWords = [];

function goToScreen(n) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + n).classList.add('active');
}

// Screen 2 logic
const inputs = ['inp1', 'inp2', 'inp3'].map(id => document.getElementById(id));
const qFade = document.getElementById('q-fade');
const enterBtn = document.getElementById('enterBtn');

function checkInputs() {
  const filled = inputs.every(i => i.value.trim().length > 0);
  enterBtn.classList.toggle('ready', filled);
  qFade.style.opacity = inputs[0].value.length > 0 ? '0.3' : '1';
}
inputs.forEach(i => i.addEventListener('input', checkInputs));
inputs[2].addEventListener('keydown', e => {
  if (e.key === 'Enter' && enterBtn.classList.contains('ready')) submitWords();
});

function submitWords() {
  if (!enterBtn.classList.contains('ready')) return;
  userWords = inputs.map(i => i.value.trim());
  goToScreen(3);
  runCloudScreen();
}

// Screen 3 - floating words animation
function runCloudScreen() {
  const wrap = document.getElementById('cloudWrap');
  wrap.innerHTML = '';

  const pool = shuffle(otherPhrases).slice(0, 7);
  // insert user words randomly into the sequence, slightly emphasized
  const sequence = shuffle([...pool, ...userWords.map(w => ({user: true, text: w}))]);

  const positions = [
    {top: '10%', left: '6%'}, {top: '18%', left: '42%'}, {top: '14%', left: '70%'},
    {top: '32%', left: '15%'}, {top: '30%', left: '55%'}, {top: '44%', left: '8%'},
    {top: '46%', left: '64%'}, {top: '58%', left: '30%'}, {top: '62%', left: '72%'},
    {top: '74%', left: '12%'}, {top: '76%', left: '48%'}
  ];
  const shuffledPositions = shuffle(positions);

  let delay = 300;
  sequence.forEach((item, idx) => {
    const el = document.createElement('div');
    const isUser = typeof item === 'object' && item.user;
    el.className = 'floating-word' + (isUser ? ' user-word' : '');
    el.textContent = isUser ? item.text : item;
    const pos = shuffledPositions[idx % shuffledPositions.length];
    el.style.top = pos.top;
    el.style.left = pos.left;
    wrap.appendChild(el);

    setTimeout(() => el.classList.add('show'), delay);
    setTimeout(() => el.classList.remove('show'), delay + 2200);
    delay += 650;
  });

  const totalTime = delay + 1800;
  setTimeout(() => {
    goToScreen(4);
    runFinalScreen();
  }, totalTime);
}

// Screen 4 - final reveal
function runFinalScreen() {
  const list = document.getElementById('finalList');
  list.innerHTML = '';
  userWords.forEach((w, i) => {
    const p = document.createElement('p');
    p.className = 'final-item';
    p.textContent = w;
    list.appendChild(p);
    setTimeout(() => p.classList.add('show'), 400 + i * 500);
  });

  const divider = document.getElementById('finalDivider');
  const caption = document.getElementById('finalCaption');
  const restart = document.getElementById('restartHint');
  divider.classList.remove('show');
  caption.classList.remove('show');
  restart.classList.remove('show');

  setTimeout(() => divider.classList.add('show'), 400 + userWords.length * 500 + 300);
  setTimeout(() => caption.classList.add('show'), 400 + userWords.length * 500 + 700);
  setTimeout(() => restart.classList.add('show'), 400 + userWords.length * 500 + 2200);
}

function restart() {
  inputs.forEach(i => i.value = '');
  checkInputs();
  goToScreen(1);
}
</script>

</body>
</html>
